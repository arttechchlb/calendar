<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
<title>Задачи</title>
<style>
:root{
  --bg:#111318;--bg2:#171a21;--card:#20242d;--card2:#262b35;--line:rgba(255,255,255,.08);
  --text:#f2f4f8;--muted:#9aa3b2;--soft:#697386;--blue:#7aa7ff;--red:#ff6b6b;--green:#70d69d;
  --shadow:0 18px 55px rgba(0,0,0,.38);--r:22px;--rs:14px;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100vh;font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden}
body{display:flex;align-items:center;justify-content:center}
body:before{content:"";position:fixed;inset:0;background:
radial-gradient(circle at 20% 10%,rgba(122,167,255,.16),transparent 30%),
radial-gradient(circle at 85% 20%,rgba(112,214,157,.08),transparent 32%),
linear-gradient(135deg,#0f1116,#1a1d25 55%,#101217);z-index:-1}
button,input,textarea,select{font-family:inherit}
.widget{width:96%;max-width:1400px;height:90vh;max-height:820px;background:rgba(25,28,36,.88);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
.header{height:58px;padding:13px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);flex-shrink:0}
.header-title{font-size:16px;font-weight:650;letter-spacing:.2px}
.header-actions{display:flex;gap:8px;align-items:center}
.actionBtn{width:32px;height:32px;border:none;border-radius:10px;background:rgba(255,255,255,.06);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center}
.actionBtn:hover{background:rgba(255,255,255,.1);color:var(--text)}
.content{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:14px 16px 12px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.22) transparent;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{width:6px}.content::-webkit-scrollbar-track{background:transparent}.content::-webkit-scrollbar-thumb{background:rgba(255,255,255,.22);border-radius:8px}

.column{display:flex;flex-direction:column;gap:14px;min-width:0}
.column-header{text-align:center;padding:10px 8px;border-radius:var(--rs);background:linear-gradient(135deg,rgba(122,167,255,.08),rgba(255,255,255,.02));border:1px solid var(--line);flex-shrink:0;transition:.2s}
.column-title{font-size:13px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase}
.column-count{font-size:11px;color:var(--muted);margin-top:3px}
.column[data-owner="oleg"] .column-title{color:#9cc0ff}
.column[data-owner="natasha"] .column-title{color:#ff9ec7}
.column[data-owner="tanya"] .column-title{color:#a9e5c4}
.column[data-owner="oleg"] .column-header{background:linear-gradient(135deg,rgba(122,167,255,.12),rgba(255,255,255,.02))}
.column[data-owner="natasha"] .column-header{background:linear-gradient(135deg,rgba(255,120,180,.12),rgba(255,255,255,.02))}
.column[data-owner="tanya"] .column-header{background:linear-gradient(135deg,rgba(112,214,157,.12),rgba(255,255,255,.02))}

.content.delete-mode .column-header{border-color:rgba(255,107,107,.35);box-shadow:0 0 0 1px rgba(255,107,107,.08) inset}

.block{background:rgba(255,255,255,.035);border:1px solid var(--line);border-radius:var(--rs);padding:12px;flex-shrink:0}
.block-title{font-size:11px;font-weight:750;letter-spacing:.7px;text-transform:uppercase;color:var(--soft);margin-bottom:9px}
.empty{font-size:13px;color:var(--soft);text-align:center;padding:14px 5px;font-style:italic}
.task-row{display:flex;align-items:center;gap:10px;padding:10px 9px;border-radius:12px;cursor:pointer;border:1px solid transparent;transition:background .18s,border-color .18s,opacity .2s,transform .2s;background:rgba(255,255,255,.025);margin-top:7px}
.task-row:first-of-type{margin-top:0}
.task-row:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.08)}
.task-row.today{border-left:3px solid var(--blue)}
.task-row.overdue{border-left:3px solid var(--red)}
.task-main{flex:1;min-width:0}
.task-line{font-size:14px;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta{color:var(--blue);font-weight:650}
.sep{color:var(--soft);margin:0 6px}
.title{color:var(--text)}
.rank{width:36px;height:30px;border-radius:10px;background:rgba(122,167,255,.12);color:#cfe0ff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:750;flex-shrink:0}
.overdue .meta{color:var(--red)}.overdue .rank{background:rgba(255,107,107,.13);color:#ffc6c6}

.delete-x{width:32px;height:32px;border-radius:50%;border:none;background:var(--red);color:white;font-size:20px;font-weight:750;line-height:1;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:transform .18s,filter .18s,box-shadow .18s;box-shadow:0 4px 14px rgba(255,107,107,.35)}
.delete-x:hover{transform:scale(1.1);filter:brightness(1.12)}
.delete-x:active{transform:scale(.92)}

.content.delete-mode .task-row{cursor:default;background:rgba(255,107,107,.04)}
.content.delete-mode .task-row:hover{background:rgba(255,107,107,.09);border-color:rgba(255,107,107,.18)}
.task-row.deleting{opacity:0;transform:translateX(24px);pointer-events:none}

.controls{min-height:96px;padding:12px 18px 14px;background:rgba(17,19,24,.78);border-top:1px solid var(--line);display:flex;flex-direction:column;gap:10px;flex-shrink:0}
.total-row{text-align:center;font-size:13px;color:var(--muted);background:rgba(255,255,255,.045);border:1px solid var(--line);border-radius:12px;padding:7px 10px}
.total-row b{color:var(--text)}
.controls-btns{display:flex;align-items:center;justify-content:center;gap:13px}
.controlBtn,.scrollBtn{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:rgba(255,255,255,.07);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.18s}
.controlBtn{font-size:23px}.scrollBtn svg{width:20px;height:20px}
.controlBtn:hover,.scrollBtn:hover{transform:scale(1.06);background:rgba(255,255,255,.11)}
.controlBtn:active,.scrollBtn:active{transform:scale(.95)}
.controlBtn.active{background:var(--red);border-color:var(--red);color:white}
.overlay{position:absolute;inset:0;z-index:10;background:rgba(9,10,13,.68);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transform:scale(.985);transition:.2s}
.overlay.visible{opacity:1;pointer-events:auto;transform:scale(1)}
.form,.details,.importBox,.trashBox{width:88%;max-width:520px;max-height:86%;overflow-y:auto;background:#1d212a;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:17px;display:flex;flex-direction:column;gap:10px}
.formTitle,.detailTitle,.importTitle,.trashTitle{font-size:16px;font-weight:750;text-align:center;line-height:1.3}
input,textarea,select{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.055);color:var(--text);border-radius:12px;outline:none;font-size:14px}
input{height:42px;padding:0 13px}
textarea{min-height:92px;resize:vertical;padding:12px 13px;line-height:1.35}
select{height:42px;padding:0 10px;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%239aa3b2' d='M6 8L0 0h12z'/></svg>");background-repeat:no-repeat;background-position:right 13px center;padding-right:34px}
input:focus,textarea:focus,select:focus{border-color:rgba(122,167,255,.55);box-shadow:0 0 0 3px rgba(122,167,255,.1)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}

.owner-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.owner-label{display:flex;align-items:center;justify-content:center;gap:6px;height:40px;border:1px solid var(--line);background:rgba(255,255,255,.04);border-radius:12px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);transition:.18s;user-select:none}
.owner-label:hover{background:rgba(255,255,255,.08)}
.owner-label input{display:none}
.owner-label[data-v="oleg"].checked{background:rgba(122,167,255,.18);border-color:rgba(122,167,255,.5);color:#cfe0ff}
.owner-label[data-v="natasha"].checked{background:rgba(255,120,180,.18);border-color:rgba(255,120,180,.5);color:#ffd2e4}
.owner-label[data-v="tanya"].checked{background:rgba(112,214,157,.18);border-color:rgba(112,214,157,.5);color:#d3f3e1}
.owner-label[data-v="auto"].checked{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25);color:var(--text)}
 

/* === КНОПКИ ПРИОРИТЕТА === */
.priority-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.priority-btn{height:44px;border:2px solid;border-radius:12px;background:transparent;font-size:12px;font-weight:750;letter-spacing:.8px;cursor:pointer;transition:.18s;text-transform:uppercase}
.priority-btn.urgent{border-color:var(--red);color:var(--red)}
.priority-btn.urgent:hover,.priority-btn.urgent.active{background:var(--red);color:white}
.priority-btn.desirable{border-color:#ffc107;color:#ffc107}
.priority-btn.desirable:hover,.priority-btn.desirable.active{background:#ffc107;color:#111}
.priority-btn.ifpossible{border-color:var(--blue);color:var(--blue)}
.priority-btn.ifpossible:hover,.priority-btn.ifpossible.active{background:var(--blue);color:white}

/* === ЦВЕТНОЙ КРУЖОК ВМЕСТО РЕЙТИНГА === */
.priority-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.priority-dot.urgent{background:var(--red);box-shadow:0 0 8px rgba(255,107,107,.5)}
.priority-dot.desirable{background:#ffc107;box-shadow:0 0 8px rgba(255,193,7,.5)}
.priority-dot.ifpossible{background:var(--blue);box-shadow:0 0 8px rgba(122,167,255,.5)}
.owner-label.error{border-color:var(--red)!important;box-shadow:0 0 0 2px rgba(255,107,107,.3)}
.owner-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.owner-dot.oleg{background:#7aa7ff}
.owner-dot.natasha{background:#ff78b4}
.owner-dot.tanya{background:#70d69d}
.owner-dot.auto{background:var(--soft)}

.formError{min-height:16px;color:var(--red);font-size:12px;text-align:center}
.formActions,.detailActions,.importActions,.trashActions{display:flex;gap:8px}
.formBtn{flex:1;height:40px;border:none;border-radius:12px;font-size:14px;font-weight:650;cursor:pointer}
.primary{background:var(--blue);color:#10131a}.secondary{background:rgba(255,255,255,.07);color:var(--text);border:1px solid var(--line)}.danger{background:var(--red);color:white}
.primary:hover{filter:brightness(1.06)}.secondary:hover{background:rgba(255,255,255,.1)}.danger:hover{filter:brightness(1.08)}
.detailMeta{font-size:13px;color:var(--muted);text-align:center}
.detailOwner{margin:2px auto 0;width:max-content;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:750;letter-spacing:.8px;text-transform:uppercase}
.detailOwner.oleg{background:rgba(122,167,255,.16);color:#cfe0ff}
.detailOwner.natasha{background:rgba(255,120,180,.16);color:#ffd2e4}
.detailOwner.tanya{background:rgba(112,214,157,.16);color:#d3f3e1}
.detailRank{margin:2px auto 4px;width:max-content;min-width:60px;text-align:center;padding:7px 12px;border-radius:999px;font-size:13px;font-weight:750}
.detailRank.urgent{background:rgba(255,107,107,.15);color:var(--red)}
.detailRank.desirable{background:rgba(255,193,7,.15);color:#ffc107}
.detailRank.ifpossible{background:rgba(122,167,255,.15);color:var(--blue)}
.detailDesc{white-space:pre-wrap;line-height:1.45;font-size:14px;color:#d9dee8;background:rgba(255,255,255,.045);border:1px solid var(--line);border-radius:14px;padding:12px;min-height:80px}

.importSection,.trashSection{background:rgba(255,255,255,.035);border:1px solid var(--line);border-radius:12px;padding:12px}
.importSectionTitle,.trashSectionTitle{font-size:11px;font-weight:750;letter-spacing:.7px;text-transform:uppercase;color:var(--soft);margin-bottom:9px}
.importInfo{font-size:13px;color:var(--muted);text-align:center;padding:6px 0}
.importInfo b{color:var(--text)}
.importWarn{font-size:12px;color:var(--red);background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.15);border-radius:10px;padding:8px 10px;text-align:center;line-height:1.4}

/* Стили корзины */
.trash-content{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:14px 16px 12px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.trash-column{display:flex;flex-direction:column;gap:14px;min-width:0}
.trash-column-header{text-align:center;padding:10px 8px;border-radius:var(--rs);background:linear-gradient(135deg,rgba(255,107,107,.08),rgba(255,255,255,.02));border:1px solid var(--line);flex-shrink:0}
.trash-column-title{font-size:13px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--red)}
.trash-column-count{font-size:11px;color:var(--muted);margin-top:3px}
.trash-row{display:flex;align-items:center;gap:10px;padding:10px 9px;border-radius:12px;border:1px solid transparent;background:rgba(255,255,255,.025);margin-top:7px;transition:background .18s}
.trash-row:first-of-type{margin-top:0}
.trash-row:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.08)}
.trash-main{flex:1;min-width:0}
.trash-line{font-size:14px;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trash-days{width:36px;height:30px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:750;flex-shrink:0}
.trash-days.safe{background:rgba(112,214,157,.12);color:#70d69d}
.trash-days.warn{background:rgba(255,193,7,.12);color:#ffc107}
.trash-days.danger{background:rgba(255,107,107,.12);color:#ff6b6b}
.trash-actions{display:flex;gap:6px}
.trash-btn{width:28px;height:28px;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:transform .18s}
.trash-btn:hover{transform:scale(1.1)}
.trash-btn.restore{background:rgba(122,167,255,.15);color:#7aa7ff}
.trash-btn.delete{background:rgba(255,107,107,.15);color:#ff6b6b}

@media(max-width:900px){
  .content{grid-template-columns:repeat(3,minmax(300px,1fr));overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory}
  .column{scroll-snap-align:start;overflow-y:auto}
  .trash-content{grid-template-columns:repeat(3,minmax(300px,1fr));overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory}
  .trash-column{scroll-snap-align:start;overflow-y:auto}
}
@media(max-width:480px){.widget{width:100%;height:100vh;max-height:100vh;border-radius:0}.row2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="widget">
  <div class="header">
    <div class="header-title">Задачи</div>
    <div class="header-actions">
      <select id="userSelect" style="height:32px;border-radius:8px;font-size:12px;padding:0 8px;margin-right:8px;background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--line);cursor:pointer">
        <option value="">Кто вы?</option>
        <option value="oleg">Олег</option>
        <option value="natasha">Наташа</option>
        <option value="tanya">Таня</option>
      </select>
      <button class="actionBtn" id="exportBtn" title="Скачать бэкап">💾</button>
      <button class="actionBtn" id="importBtn" title="Загрузить бэкап">📥</button>
    </div>
  </div>

  <main id="content" class="content"></main>

  <footer class="controls">
    <div class="total-row">Всего задач — <b id="taskCount">0</b></div>
    <div class="controls-btns">
      <button id="addBtn" class="controlBtn" title="Добавить">+</button>
      <button id="scrollBtn" class="scrollBtn" title="Прокрутить вниз">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </button>
      <button id="deleteBtn" class="controlBtn" title="Удалить">−</button>
      <button id="trashBtn" class="controlBtn" title="Корзина">🗑</button>
    </div>
  </footer>

  <div id="formOverlay" class="overlay">
    <form id="taskForm" class="form">
      <div id="formTitle" class="formTitle">Новая задача</div>
      <div class="owner-row" id="ownerRow">
  	<label class="owner-label" data-v="oleg"><input type="radio" name="owner" value="oleg"><span class="owner-dot oleg"></span>Олег</label>
  	<label class="owner-label" data-v="natasha"><input type="radio" name="owner" value="natasha"><span class="owner-dot natasha"></span>Наташа</label>
  	<label class="owner-label" data-v="tanya"><input type="radio" name="owner" value="tanya"><span class="owner-dot tanya"></span>Таня</label>
      </div>
      <input id="titleInput" type="text" maxlength="90" placeholder="Задача" required />
      <div class="row2">
        <input id="dateInput" type="date" />
        <input id="timeInput" type="time" />
      </div>
      <div class="priority-row" id="priorityRow">
        <button type="button" class="priority-btn urgent" data-priority="urgent">Срочно</button>
        <button type="button" class="priority-btn desirable" data-priority="desirable">Желательно</button>
        <button type="button" class="priority-btn ifpossible" data-priority="ifpossible">Если успеешь</button>
      </div>
      <textarea id="descInput" maxlength="2500" placeholder="Описание"></textarea>
      <div id="formError" class="formError"></div>
      <div class="formActions">
        <button type="button" id="cancelBtn" class="formBtn secondary">Отмена</button>
        <button type="submit" class="formBtn primary">Сохранить</button>
      </div>
    </form>
  </div>

  <div id="detailOverlay" class="overlay">
    <div class="details">
      <div id="detailOwner" class="detailOwner"></div>
      <div id="detailTitle" class="detailTitle"></div>
      <div id="detailMeta" class="detailMeta"></div>
      <div id="detailRank" class="detailRank"></div>
      <div id="detailDesc" class="detailDesc"></div>
      <div class="detailActions">
        <button id="closeDetailBtn" class="formBtn secondary">Закрыть</button>
        <button id="editDetailBtn" class="formBtn primary">Редактировать</button>
      </div>
    </div>
  </div>

  <div id="importOverlay" class="overlay">
    <div class="importBox">
      <div class="importTitle">Загрузка задач из файла</div>
      <div class="importInfo">В файле найдено задач: <b id="importCount">0</b></div>
      <div class="importSection">
        <div class="importSectionTitle">Кому принадлежат задачи?</div>
        <div class="owner-row" id="importOwnerRow">
          <label class="owner-label" data-v="oleg"><input type="radio" name="importOwner" value="oleg"><span class="owner-dot oleg"></span>Олег</label>
          <label class="owner-label" data-v="natasha"><input type="radio" name="importOwner" value="natasha"><span class="owner-dot natasha"></span>Наташа</label>
          <label class="owner-label" data-v="tanya"><input type="radio" name="importOwner" value="tanya"><span class="owner-dot tanya"></span>Таня</label>
          <label class="owner-label" data-v="auto" style="grid-column:1/-1"><input type="radio" name="importOwner" value="auto" checked><span class="owner-dot auto"></span>Как в файле (если owner не указан — к Олегу)</label>
        </div>
      </div>
      <div class="importSection">
        <div class="importSectionTitle">Что сделать с текущими задачами?</div>
        <div class="row2" style="grid-template-columns:1fr 1fr">
          <label class="owner-label" data-mode="merge" style="height:44px"><input type="radio" name="importMode" value="merge" checked>➕ Объединить</label>
          <label class="owner-label" data-mode="replace" style="height:44px"><input type="radio" name="importMode" value="replace">🗑 Заменить все</label>
        </div>
      </div>
      <div id="importWarn" class="importWarn" style="display:none">⚠️ Режим «Заменить все» удалит текущие задачи у всех владельцев!</div>
      <div class="formError" id="importError"></div>
      <div class="importActions">
        <button type="button" id="importCancelBtn" class="formBtn secondary">Отмена</button>
        <button type="button" id="importConfirmBtn" class="formBtn primary">Загрузить</button>
      </div>
    </div>
  </div>

  <div id="trashOverlay" class="overlay">
    <div class="trashBox" style="max-width:1200px;width:95%">
      <div class="trashTitle">Корзина</div>
      <div id="trashContent" class="trash-content"></div>
      <div class="trashActions">
        <button id="closeTrashBtn" class="formBtn secondary">Закрыть</button>
        <button id="emptyTrashBtn" class="formBtn danger">Очистить корзину</button>
      </div>
    </div>
  </div>
</div>

<input type="file" id="importFile" accept=".json" style="display:none" />

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {

let tasks=[];

let openedTaskId=null;
let notified=new Set();
let importPending=null;
let isRemoteSync=false;

function esc(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}
function clamp(n,min,max){n=parseInt(n,10);return Number.isFinite(n)?Math.min(max,Math.max(min,n)):min}
function pad(n){return String(n).padStart(2,'0')}
function today(){const d=new Date();d.setHours(0,0,0,0);return d}
function iso(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}
function todayISO(){return iso(today())}
function parseDate(s){if(!/^\d{4}-\d{2}-\d{2}$/.test(String(s)))return null;const [y,m,d]=s.split('-').map(Number);const x=new Date(y,m-1,d);x.setHours(0,0,0,0);return iso(x)===s?x:null}
function validDate(s){return !!parseDate(s)}
function validTime(s){return /^([01]\d|2[0-3]):[0-5]\d$/.test(String(s))}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);x.setHours(0,0,0,0);return x}
function daysBetween(s,end){const d=parseDate(s);if(!d)return 0;return Math.max(0,Math.floor((end-d)/86400000))}
function effectiveRank(t){return Math.max(1,clamp(t.rankBase,1,100)-daysBetween(t.rankSetAt,today()))}
function timeMin(t){return validTime(t.time)?Number(t.time.slice(0,2))*60+Number(t.time.slice(3,5)):9999}

function formatDate(s){
  const d=parseDate(s); if(!d)return '';
  const opts={day:'numeric',month:'short'};
  if(d.getFullYear()!==today().getFullYear())opts.year='numeric';
  return d.toLocaleDateString('ru-RU',opts).replace('.','');
}
function meta(t){
  const d=t.date?formatDate(t.date):'';
  const tm=validTime(t.time)?t.time:'';
  if(d&&tm)return `${d}, ${tm}`;
  return d||tm||'';
}
function ownerShort(t){return (OWNERS.find(o=>o.id===t.owner)||OWNERS[0]).short}
function statusClass(t){
  if(t.date===todayISO())return 'today';
  if(t.date && t.date<todayISO())return 'overdue';
  return '';
}

function normalizeTask(x){
  const title=String(x.title??x.task??'').trim();
  if(!title)return null;
  const date=validDate(x.date??x.deadlineDate)?String(x.date??x.deadlineDate):'';
  const time=validTime(x.time??x.deadlineTime)?String(x.time??x.deadlineTime):'';
  const createdAt=x.createdAt||new Date().toISOString();
  let rankSetAt=validDate(x.rankSetAt)?x.rankSetAt:'';
  if(!rankSetAt && typeof createdAt==='string' && validDate(createdAt.slice(0,10)))rankSetAt=createdAt.slice(0,10);
  if(!rankSetAt)rankSetAt=todayISO();
  const validPriority=v=>['urgent','desirable','ifpossible'].includes(v)?v:(v?'desirable':'ifpossible');
  return {
    id:String(x.id||Date.now().toString(36)+Math.random().toString(36).slice(2,8)),
    title:title.slice(0,90),
    date,
    time,
    owner:validOwner(x.owner),
    priority:validPriority(x.priority),
    rankBase:clamp(x.rankBase??x.rating??x.rank,1,100),
    rankSetAt,
    desc:String(x.desc??x.description??'').slice(0,2500),
    createdAt
  };
}

function save(){
  if(isRemoteSync) return;
  isRemoteSync=true;
  set(tasksRef, tasks).catch(err=>{
    console.error('Firebase save error:', err);
    alert('Ошибка синхронизации. Проверьте интернет или конфиг Firebase.');
  }).finally(()=>{ isRemoteSync=false; });
}

function saveTrash(){
  if(isRemoteSync) return;
  isRemoteSync=true;
  set(trashRef, trash).catch(err=>{
    console.error('Firebase trash save error:', err);
  }).finally(()=>{ isRemoteSync=false; });
}

onValue(tasksRef, (snapshot)=>{
  const data = snapshot.val();
  const raw = data ? (Array.isArray(data) ? data : Object.values(data)) : [];
  const normalized = raw.map(normalizeTask).filter(Boolean);
  if(JSON.stringify(tasks) !== JSON.stringify(normalized)){
    tasks = normalized;
    render();
    updateCount();
  }
}, (error)=>{
  console.error('Firebase read error:', error);
});

onValue(trashRef, (snapshot)=>{
  const data = snapshot.val();
  const raw = data ? (Array.isArray(data) ? data : Object.values(data)) : [];
  const normalized = raw.map(normalizeTask).filter(Boolean);
  if(JSON.stringify(trash) !== JSON.stringify(normalized)){
    trash = normalized;
    if($('trashOverlay').classList.contains('visible')){
      renderTrash();
    }
  }
}, (error)=>{
  console.error('Firebase trash read error:', error);
});

function saveNotified(){
  try{localStorage.setItem(NOTIFY_KEY,JSON.stringify([...notified].slice(-120)))}catch{}
}

function sortToday(a,b){return timeMin(a)-timeMin(b)||effectiveRank(a)-effectiveRank(b)||a.title.localeCompare(b.title,'ru')}
function sortGeneral(a,b){
  const ca=a.date?(a.date<todayISO()?0:1):2;
  const cb=b.date?(b.date<todayISO()?0:1):2;
  if(ca!==cb)return ca-cb;
  if(ca===2)return effectiveRank(a)-effectiveRank(b)||a.title.localeCompare(b.title,'ru');
  return a.date.localeCompare(b.date)||timeMin(a)-timeMin(b)||effectiveRank(a)-effectiveRank(b)||a.title.localeCompare(b.title,'ru');
}

function updateCount(){$('taskCount').textContent=tasks.length}

function removeTaskAnimated(id, rowEl){
  const task=tasks.find(x=>x.id===id);
  if(!task) return;
  
  // Добавляем в корзину
  task.deletedAt=todayISO();
  trash.push(task);
  saveTrash();
  
  // Удаляем из основного списка
  rowEl.classList.add('deleting');
  setTimeout(()=>{
    tasks=tasks.filter(x=>x.id!==id);
    save();
  },180);
}

function makeTaskRow(t){
  const div=document.createElement('div');
  div.className=`task-row ${statusClass(t)}`;
  const m=meta(t);
  if(deleteMode){
    div.innerHTML=`<div class="task-main"><div class="task-line">${m?`<span class="meta">${esc(m)}</span><span class="sep">—</span>`:''}<span class="title">${esc(t.title)}</span></div></div><button class="delete-x" aria-label="Удалить задачу" title="Удалить">×</button>`;
    div.querySelector('.delete-x').onclick=(e)=>{e.stopPropagation();removeTaskAnimated(t.id, div);};
  }else{
  const p=t.priority||'ifpossible';
  div.innerHTML=`<div class="task-main"><div class="task-line">${m?`<span class="meta">${esc(m)}</span><span class="sep">—</span>`:''}<span class="title">${esc(t.title)}</span></div></div><div class="priority-dot ${p}" title="${p==='urgent'?'Срочно':p==='desirable'?'Желательно':'Если успеешь'}"></div>`;
  div.onclick=()=>openDetail(t.id);
}
  return div;
}

function buildColumn(owner){
  const col=document.createElement('div');
  col.className='column';
  col.dataset.owner=owner.id;
  const ownerTasks=tasks.filter(t=>t.owner===owner.id);
  const header=document.createElement('div');
  header.className='column-header';
  header.innerHTML=`<div class="column-title">${esc(owner.name)}</div><div class="column-count">${ownerTasks.length} ${plural(ownerTasks.length,'задача','задачи','задач')}${deleteMode?' • нажмите ×':''}</div>`;
  col.appendChild(header);

  const todayTasks=ownerTasks.filter(t=>t.date===todayISO()).sort(sortToday);
  const todayBlock=document.createElement('section');
  todayBlock.className='block';
  todayBlock.innerHTML='<div class="block-title">Задачи сегодня</div>';
  if(todayTasks.length)todayTasks.forEach(t=>todayBlock.appendChild(makeTaskRow(t)));
  else todayBlock.innerHTML+='<div class="empty">На сегодня задач нет</div>';
  col.appendChild(todayBlock);

  const list=ownerTasks.filter(t=>t.date!==todayISO()).sort(sortGeneral);
  const listBlock=document.createElement('section');
  listBlock.className='block';
  listBlock.innerHTML='<div class="block-title">Список задач</div>';
  if(list.length)list.forEach(t=>listBlock.appendChild(makeTaskRow(t)));
  else listBlock.innerHTML+='<div class="empty">Других задач нет</div>';
  col.appendChild(listBlock);
  return col;
}

function plural(n,a,b,c){const m=n%10,h=n%100;if(h>=11&&h<=14)return c;if(m===1)return a;if(m>=2&&m<=4)return b;return c}

function render(){
  updateCount();
  $('deleteBtn').classList.toggle('active',deleteMode);
  const c=$('content');
  c.classList.toggle('delete-mode',deleteMode);
  c.innerHTML='';
  OWNERS.forEach(o=>c.appendChild(buildColumn(o)));
}

function selectedOwner(){
  const r=document.querySelector('input[name="owner"]:checked');
  return r?validOwner(r.value):null; // Вернуть null если не выбрано
}
function setOwnerRadio(v){
  document.querySelectorAll('input[name="owner"]').forEach(r=>{r.checked=r.value===v});
  refreshOwnerLabels('ownerRow');
}
function refreshOwnerLabels(rowId){
  const row=document.getElementById(rowId);
  if(!row)return;
  row.querySelectorAll('.owner-label').forEach(l=>{
    const inp=l.querySelector('input');
    l.classList.toggle('checked',inp.checked);
  });
}

  function setPriority(p){
  editPriority=p;
  document.querySelectorAll('#priorityRow .priority-btn').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.priority===p);
  });
}
function getSelectedPriority(){
  return editPriority || null;
}

function openForm(id=null){
  if(deleteMode){deleteMode=false;render()}
  editId=id;
  $('formError').textContent='';
  $('taskForm').reset();
  if(id){
    const t=tasks.find(x=>x.id===id); if(!t)return;
    editPriority=t.priority||'desirable';
    $('formTitle').textContent='Редактировать задачу';
    setOwnerRadio(t.owner||'oleg');
    setPriority(editPriority);
    $('titleInput').value=t.title;
    $('dateInput').value=t.date||'';
    $('timeInput').value=t.time||'';
    $('descInput').value=t.desc||'';
  }else{
    editPriority=null;
    $('formTitle').textContent='Новая задача';
    setOwnerRadio(null);
    setPriority(null);
    document.querySelectorAll('#ownerRow .owner-label').forEach(l=>l.classList.remove('error'));
  }
  $('formOverlay').classList.add('visible');
  setTimeout(()=>$('titleInput').focus(),50);
}
function closeForm(){
  $('formOverlay').classList.remove('visible');
  $('formError').textContent='';
  $('taskForm').reset();
  editId=null; editPriority=null;
  document.querySelectorAll('#priorityRow .priority-btn').forEach(btn=>{
    btn.classList.remove('active');
    btn.style.outline='';
    btn.style.outlineOffset='';
  });
}
function submitForm(){
  const owner=selectedOwner();
  const priority=getSelectedPriority();
  const title=$('titleInput').value.trim();
  const date=$('dateInput').value;
  const time=$('timeInput').value;
  const desc=$('descInput').value.trim();
  const err=$('formError'); err.textContent='';

  if(!owner){
    err.textContent='Выберите, кому принадлежит задача';
    document.querySelectorAll('#ownerRow .owner-label').forEach(l=>l.classList.add('error'));
    setTimeout(()=>{
      document.querySelectorAll('#ownerRow .owner-label').forEach(l=>l.classList.remove('error'));
    }, 3000);
    return;
  }
  if(!priority){
    err.textContent='Выберите приоритет задачи';
    document.querySelectorAll('#priorityRow .priority-btn').forEach(btn=>{
      btn.style.outline='2px solid var(--red)';
      btn.style.outlineOffset='2px';
    });
    setTimeout(()=>{
      document.querySelectorAll('#priorityRow .priority-btn').forEach(btn=>{
        btn.style.outline='';
        btn.style.outlineOffset='';
      });
    }, 3000);
    return;
  }

  if(!title){err.textContent='Введите задачу';return}
  if(date && !validDate(date)){err.textContent='Некорректная дата';return}
  if(time && !validTime(time)){err.textContent='Некорректное время';return}

  if(editId){
    const t=tasks.find(x=>x.id===editId); if(!t)return;
    t.title=title; t.date=date||''; t.time=time||''; t.desc=desc; t.owner=owner;
    t.priority=priority;
  }else{
    tasks.push({
      id:Date.now().toString(36)+Math.random().toString(36).slice(2,8),
      title,date:date||'',time:time||'',owner,priority,desc,createdAt:new Date().toISOString()
    });
  }
  save(); closeForm();
}

function openDetail(id){
  if(deleteMode)return;
  const t=tasks.find(x=>x.id===id); if(!t)return;
  openedTaskId=id;
  const owner=OWNERS.find(o=>o.id===t.owner)||OWNERS[0];
  const ownerEl=$('detailOwner');
  ownerEl.textContent=owner.short;
  ownerEl.className='detailOwner '+owner.id;
  $('detailTitle').textContent=t.title;
  $('detailMeta').textContent=meta(t)||'Без даты и времени';
  const pName=t.priority==='urgent'?'Срочно':t.priority==='desirable'?'Желательно':'Если успеешь';
  $('detailRank').textContent=pName;
  $('detailRank').className='detailRank '+((t.priority||'ifpossible'));
  $('detailDesc').textContent=t.desc||'Описание не добавлено';
  $('detailOverlay').classList.add('visible');
}
function closeDetail(){
  $('detailOverlay').classList.remove('visible');
  openedTaskId=null;
}

function openImportDialog(data){
  importPending={data};
  $('importCount').textContent=data.length;
  $('importError').textContent='';
  document.querySelectorAll('input[name="importOwner"]').forEach(r=>{r.checked=r.value==='auto'});
  document.querySelectorAll('input[name="importMode"]').forEach(r=>{r.checked=r.value==='merge'});
  refreshOwnerLabels('importOwnerRow');
  refreshModeLabels();
  $('importOverlay').classList.add('visible');
}
function closeImportDialog(){
  $('importOverlay').classList.remove('visible');
  importPending=null;
}
function refreshModeLabels(){
  document.querySelectorAll('[data-mode]').forEach(l=>{
    const inp=l.querySelector('input');
    l.classList.toggle('checked',inp.checked);
  });
  const mode=document.querySelector('input[name="importMode"]:checked').value;
  $('importWarn').style.display=(mode==='replace')?'block':'none';
}
function confirmImport(){
  if(!importPending)return;
  const ownerChoice=document.querySelector('input[name="importOwner"]:checked').value;
  const mode=document.querySelector('input[name="importMode"]:checked').value;
  const err=$('importError'); err.textContent=''; err.style.color='';

  let imported=importPending.data;
  if(ownerChoice!=='auto'){
    imported=imported.map(t=>({...t, owner:ownerChoice}));
  }

  if(mode==='replace'){
    tasks=imported;
  }else{
    const existingIds=new Set(tasks.map(t=>t.id));
    let added=0, skipped=0;
    imported.forEach(t=>{
      if(existingIds.has(t.id)){skipped++;return}
      tasks.push(t); added++;
    });
    if(added===0 && skipped>0){
      err.textContent=`Все ${skipped} задач уже существуют — ничего не добавлено.`;
      return;
    }
    if(skipped>0){
      err.style.color='var(--muted)';
      err.textContent=`Добавлено: ${added}. Пропущено дубликатов: ${skipped}.`;
      setTimeout(()=>{err.style.color='';err.textContent=''},2500);
    }
  }
  save(); deleteMode=false; closeImportDialog();
}

// === КОРЗИНА ===
function getDaysUntilDelete(task){
  if(!task.deletedAt) return 30;
  const daysPassed=daysBetween(task.deletedAt, addDays(today(), 1));
  return Math.max(1, 30 - daysPassed);
}

function getDaysClass(days){
  if(days > 10) return 'safe';
  if(days > 5) return 'warn';
  return 'danger';
}

function renderTrash(){
  const container=$('trashContent');
  container.innerHTML='';
  
  OWNERS.forEach(owner=>{
    const col=document.createElement('div');
    col.className='trash-column';
    
    const ownerTrash=trash.filter(t=>t.owner===owner.id);
    // Сортировка: недавно удалённые сверху (по deletedAt desc)
    ownerTrash.sort((a,b)=>{
      if(!a.deletedAt && !b.deletedAt) return 0;
      if(!a.deletedAt) return 1;
      if(!b.deletedAt) return -1;
      return b.deletedAt.localeCompare(a.deletedAt);
    });
    
    const header=document.createElement('div');
    header.className='trash-column-header';
    header.innerHTML=`<div class="trash-column-title">Корзина ${owner.short}</div><div class="trash-column-count">${ownerTrash.length} ${plural(ownerTrash.length,'задача','задачи','задач')}</div>`;
    col.appendChild(header);
    
    const block=document.createElement('section');
    block.className='block';
    
    if(ownerTrash.length===0){
      block.innerHTML='<div class="empty">Корзина пуста</div>';
    }else{
      ownerTrash.forEach(t=>{
        const row=document.createElement('div');
        row.className='trash-row';
        const days=getDaysUntilDelete(t);
        const daysClass=getDaysClass(days);
        
        row.innerHTML=`
          <div class="trash-main">
            <div class="trash-line">
              <span class="title">${esc(t.title)}</span>
            </div>
          </div>
          <div class="trash-actions">
            <button class="trash-btn restore" title="Восстановить">↩</button>
            <button class="trash-btn delete" title="Удалить навсегда">×</button>
          </div>
          <div class="trash-days ${daysClass}">${days}</div>
        `;
        
        row.querySelector('.restore').onclick=(e)=>{
          e.stopPropagation();
          restoreTask(t.id);
        };
        row.querySelector('.delete').onclick=(e)=>{
          e.stopPropagation();
          deleteTaskForever(t.id);
        };
        
        block.appendChild(row);
      });
    }
    
    col.appendChild(block);
    container.appendChild(col);
  });
}

function restoreTask(id){
  const task=trash.find(x=>x.id===id);
  if(!task) return;
  
  // Удаляем из корзины
  trash=trash.filter(x=>x.id!==id);
  delete task.deletedAt;
  
  // Добавляем обратно в задачи
  tasks.push(task);
  
  save();
  saveTrash();
}

function deleteTaskForever(id){
  if(!confirm('Удалить задачу навсегда? Это действие нельзя отменить.')) return;
  
  trash=trash.filter(x=>x.id!==id);
  saveTrash();
}

function emptyTrash(){
  if(trash.length===0){
    alert('Корзина уже пуста');
    return;
  }
  if(!confirm(`Удалить навсегда все ${trash.length} задач из корзины?`)) return;
  
  trash=[];
  saveTrash();
}

function cleanOldTrash(){
  const td=today();
  const cutoff=addDays(td, -30);
  const cutoffISO=iso(cutoff);
  
  const oldTrash=trash.filter(t=>t.deletedAt && t.deletedAt < cutoffISO);
  if(oldTrash.length > 0){
    trash=trash.filter(t=>!t.deletedAt || t.deletedAt >= cutoffISO);
    saveTrash();
    console.log(`Удалено ${oldTrash.length} старых задач из корзины`);
  }
}

function requestNotifications(){
  if(!('Notification' in window))return;
  if(Notification.permission==='default')Notification.requestPermission().then(()=>checkNotify());
  else checkNotify();
}
function notifyKey(t,type){return `${t.id}-${type}-${todayISO()}`}
function sendNotify(t,type,title){
  if(!('Notification' in window) || Notification.permission!=='granted')return;
  const key=notifyKey(t,type);
  if(notified.has(key))return;
  try{
    new Notification(`[${ownerShort(t)}] ${title}`,{body:t.title,tag:key});
    notified.add(key); saveNotified();
  }catch{}
}
function checkNotify(){
  const now=new Date();
  if(now.getHours()<10)return;
  const currentUser = localStorage.getItem('taskWidget_currentUser');
  if(!currentUser) return;
  const td=todayISO();
  const tm=iso(addDays(today(),1));
  tasks.filter(t=>t.owner===currentUser).forEach(t=>{
    if(!t.date)return;
    if(t.date===td)sendNotify(t,'today','Сегодня дедлайн');
    if(t.date===tm)sendNotify(t,'tomorrow','Завтра дедлайн');
  });
}

function bindEvents(){
  $('addBtn').onclick=()=>openForm();
  $('deleteBtn').onclick=()=>{deleteMode=!deleteMode;render()};
  $('cancelBtn').onclick=closeForm;
  $('taskForm').onsubmit=e=>{e.preventDefault();submitForm()};
  $('closeDetailBtn').onclick=closeDetail;
  $('editDetailBtn').onclick=()=>{const id=openedTaskId;closeDetail();openForm(id)};

  document.querySelectorAll('#ownerRow input[name="owner"]').forEach(r=>{
    r.addEventListener('change',()=>refreshOwnerLabels('ownerRow'));
  });
  refreshOwnerLabels('ownerRow');

  document.querySelectorAll('#priorityRow .priority-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      setPriority(btn.dataset.priority);
      document.querySelectorAll('#priorityRow .priority-btn').forEach(b=>{
        b.style.outline='';
        b.style.outlineOffset='';
      });
    });
  });

  document.querySelectorAll('#importOwnerRow input[name="importOwner"]').forEach(r=>{
    r.addEventListener('change',()=>refreshOwnerLabels('importOwnerRow'));
  });
  document.querySelectorAll('input[name="importMode"]').forEach(r=>{
    r.addEventListener('change',refreshModeLabels);
  });
  $('importCancelBtn').onclick=closeImportDialog;
  $('importConfirmBtn').onclick=confirmImport;

  $('scrollBtn').onclick=()=>{
    const c=$('content');
    const narrow=window.matchMedia('(max-width: 900px)').matches;
    if(narrow){
      const max=c.scrollWidth-c.clientWidth;
      if(max<=0)return;
      if(c.scrollLeft>=max-5)c.scrollTo({left:0,behavior:'smooth'});
      else c.scrollBy({left:Math.min(c.clientWidth*0.9,320),behavior:'smooth'});
    }else{
      const row=c.querySelector('.task-row,.block');
      const step=row?row.getBoundingClientRect().height+8:52;
      const max=c.scrollHeight-c.clientHeight;
      if(max<=0)return;
      if(c.scrollTop>=max-5)c.scrollTo({top:0,behavior:'smooth'});
      else c.scrollBy({top:step,behavior:'smooth'});
    }
  };

  $('exportBtn').onclick=()=>{
    const blob=new Blob([JSON.stringify({tasks,trash},null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`tasks-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
  };

  $('importBtn').onclick=()=>$('importFile').click();
  $('importFile').onchange=e=>{
    const file=e.target.files[0]; if(!file){return}
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!Array.isArray(data.tasks))throw new Error();
        const cleaned=data.tasks.map(normalizeTask).filter(Boolean);
        if(cleaned.length===0){alert('В файле нет валидных задач.');e.target.value='';return}
        openImportDialog(cleaned);
      }catch{alert('Файл не похож на корректный список задач.')}
      e.target.value='';
    };
    reader.readAsText(file);
  };

  // Корзина
  $('trashBtn').onclick=()=>{
    renderTrash();
    $('trashOverlay').classList.add('visible');
  };
  $('closeTrashBtn').onclick=()=>{
    $('trashOverlay').classList.remove('visible');
  };
  $('emptyTrashBtn').onclick=emptyTrash;

  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){
      if($('trashOverlay').classList.contains('visible'))$('trashOverlay').classList.remove('visible');
      else if($('importOverlay').classList.contains('visible'))closeImportDialog();
      else if($('formOverlay').classList.contains('visible'))closeForm();
      else if($('detailOverlay').classList.contains('visible'))closeDetail();
      else if(deleteMode){deleteMode=false;render()}
    }
  });

  document.addEventListener('visibilitychange',()=>{if(!document.hidden){checkNotify();cleanOldTrash()}});

  const savedUser = localStorage.getItem('taskWidget_currentUser');
  if(savedUser) $('userSelect').value = savedUser;

  $('userSelect').onchange = (e) => {
    localStorage.setItem('taskWidget_currentUser', e.target.value);
    if(e.target.value) {
      const userName = OWNERS.find(o=>o.id===e.target.value)?.short || e.target.value;
      alert('✅ Теперь уведомления будут показываться только для: ' + userName);
    }
  };
}

function init(){
  bindEvents();
  render();
  requestNotifications();
  setInterval(checkNotify,60*1000);
  setInterval(cleanOldTrash,60*60*1000); // Проверка каждый час
  
  cleanOldTrash(); // Проверить при загрузке
  
  if(!localStorage.getItem('taskWidget_currentUser')){
    setTimeout(()=>{
      alert('👋 Выберите себя в выпадающем списке "Кто вы?" вверху страницы, чтобы получать уведомления только о своих задачах!');
    }, 1500);
  }
}

init();
</script>
</body>
</html>
